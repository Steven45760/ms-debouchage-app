<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier une intervention</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Modifier une intervention</h1>

    <form id="modifierForm">

        <input type="hidden" id="id">

        <div>
            <label>N° Intervention</label>
            <input type="text" id="numero">
        </div>

        <div>
            <label>Chantier</label>
            <input type="text" id="chantier">
        </div>

        <div>
            <label>Demandé par</label>
            <input type="text" id="demandeur">
        </div>

        <div>
            <label>Type</label>
            <input type="text" id="type">
        </div>

        <div>
            <label>Date planifiée</label>
            <input type="date" id="datePlanif">
        </div>

        <div>
            <label>Ville</label>
            <input type="text" id="ville">
        </div>
