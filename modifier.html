<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Modifier une intervention</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
    <h1>Modifier une intervention</h1>
</header>

<main class="container">
    <form id="modifierForm" class="card" novalidate>
        <input type="hidden" id="id">

        <div>
            <label for="numero">N° Intervention</label>
            <input type="text" id="numero" disabled />
        </div>

        <div>
            <label for="chantier">Chantier</label>
            <input type="text" id="chantier" />
        </div>

        <div>
            <label for="demandeur">Demandé par</label>
            <input type="text" id="demandeur" />
        <div>
    <label for="type">Type</label>
    <select id="type">
        <option value="Curage">Curage</option>
        <option value="ITV">ITV</option>
        <option value="Curage + ITV">Curage + ITV</option>
    </select>
      
        <div>
            <label for="datePlanif">Date planifiée</label>
            <input type="date" id="datePlanif" />
        </div>

        <div>
            <label for="ville">Ville</label>
            <input type="text" id="ville" />
        </div>

        <div>
            <label for="statut">Statut</label>
            <select id="statut">
                <option value="À planifier">À planifier</option>
                <option value="Planifié">Planifié</option>
                <option value="En cours">En cours</option>
                <option value="Terminé">Terminé</option>
            </select>
        </div>

        <div>
            <label for="observations">Observations</label>
            <textarea id="observations" rows="4"></textarea>
        </div>

        <div>
            <label for="noteInterne">Note interne</label>
            <textarea id="noteInterne" rows="3"></textarea>
        </div>

        <button type="submit" class="btn-primary">Enregistrer les modifications</button>
    </form>

    <a href="index.html" class="btn-retour" style="margin-top:18px; display:inline-block;">⬅ Retour au tableau</a>
</main>

<div id="popupValidation" class="validation-popup">✔ Modifications enregistrées</div>

<script src="modifier.js"></script>
</body>
</html>
