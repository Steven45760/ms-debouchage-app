<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier une intervention</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Modifier une intervention</h1>

    <form id="modifierForm">

        <input type="hidden" id="id">

        <div>
            <label>N° Intervention</label>
            <input type="text" id="numero" disabled>
        </div>

        <div>
            <label>Chantier</label>
            <input type="text" id="chantier">
        </div>

        <div>
            <label>Demandé par</label>
            <input type="text" id="demandeur">
        </div>

        <div>
            <label>Type</label>
            <input type="text" id="type">
        </div>

        <div>
            <label>Date planifiée</label>
            <input type="date" id="datePlanif">
        </div>

        <div>
            <label>Ville</label>
            <input type="text" id="ville">
        </div>

        <div>
            <label>Statut</label>
            <select id="statut">
                <option value="À planifier">À planifier</option>
                <option value="Planifié">Planifié</option>
                <option value="En cours">En cours</option>
                <option value="Terminé">Terminé</option>
            </select>
        </div>

        <div>
            <label>Observations</label>
            <textarea id="observations"></textarea>
        </div>

        <div>
            <label>Note interne</label>
            <textarea id="noteInterne"></textarea>
        </div>

        <!-- ⭐⭐ LE BOUTON QUI MANQUAIT ⭐⭐ -->
        <button type="submit" class="btn-primary" style="margin-top:20px;">
            Enregistrer les modifications
        </button>

    </form>

    <a href="index.html" style="display:block; margin-top:20px; text-align:center;">
        Retour à la liste
    </a>

    <script src="modifier.js"></script>

</body>
</html>
