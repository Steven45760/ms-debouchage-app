<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des interventions</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Liste des interventions</h1>
    <input 
    type="text" 
    id="recherche" 
    placeholder="Rechercher une intervention..." 
    style="width: 90%; padding: 10px; margin: 20px auto; display: block;"
>


    <table id="tableauInterventions">
        <thead>
            <tr>
                <th>N°</th>
                <th>Chantier</th>
                <th>Demandé par</th>
                <th>Type</th>
                <th>Date planif</th>
                <th>Ville</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script src="liste.js"></script>
</body>
</html>
