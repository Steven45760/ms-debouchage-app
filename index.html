<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Interventions</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>MS Débouchage – Tableau des interventions</h1>
    </header>

    <!-- CONTENU -->
    <div class="container">

        <!-- BOUTON NOUVELLE INTERVENTION -->
        <div style="text-align:center; margin-bottom:25px;">
            <a href="formulaire.html" class="btn-primary">
                ➕ Nouvelle intervention
            </a>
        </div>

        <!-- CARD TABLEAU -->
        <div class="card">

            <!-- Barre de recherche -->
            <input 
                type="text" 
                id="recherche" 
                placeholder="Rechercher une intervention..."
            >

            <!-- Tableau -->
            <table id="tableauInterventions">
                <thead>
                    <tr>
                        <th onclick="trier('numero')">N°</th>
                        <th onclick="trier('chantier')">Chantier</th>
                        <th onclick="trier('demandeur')">Demandé par</th>
                        <th onclick="trier('type')">Type</th>
                        <th onclick="trier('datePlanif')">Date planif</th>
                        <th onclick="trier('ville')">Ville</th>
                        <th onclick="trier('statut')">Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <!-- Rempli automatiquement par liste.js -->
                </tbody>
            </table>

        </div>

    </div>

    <script src="liste.js"></script>

</body>
</html>
