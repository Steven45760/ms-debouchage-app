<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tableau des interventions</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
    <h1>Tableau des interventions</h1>
</header>

<main class="container">
    <div class="card">
        <input id="recherche" placeholder="Rechercher par chantier, ville, demandeur..." />
        <table id="tableauInterventions">
            <thead>
                <tr>
                    <th>N°</th>
                    <th>Chantier</th>
                    <th>Ville</th>
                    <th>Demandeur</th>
                    <th>Date</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyInterventions"></tbody>
        </table>
    </div>

    <div style="text-align:center; margin-top:18px;">
        <a href="#" id="resetData" class="btn">Réinitialiser données test</a>
    </div>
</main>

<script src="data-init.js"></script>
<script>
/* Rendu du tableau */
function render() {
    const tbody = document.getElementById('tbodyInterventions');
    const q = document.getElementById('recherche').value.toLowerCase();
    let interventions = JSON.parse(localStorage.getItem('interventions')) || [];
    tbody.innerHTML = '';

    interventions.forEach(inter => {
        if (q && !(
            (inter.chantier||'').toLowerCase().includes(q) ||
            (inter.ville||'').toLowerCase().includes(q) ||
            (inter.demandeur||'').toLowerCase().includes(q)
        )) return;

        const tr = document.createElement('tr');
        tr.className = 'ligne-' + (inter.statut || 'a-planifier').toLowerCase().replace(/\s/g,'-');

        tr.innerHTML = `
            <td>${inter.numero || inter.id}</td>
            <td>${inter.chantier || ''}</td>
            <td>${inter.ville || ''}</td>
            <td>${inter.demandeur || ''}</td>
            <td>${inter.datePlanif || ''}</td>
            <td><span class="statut statut-${(inter.statut||'a-planifier').toLowerCase().replace(/\s/g,'-')}">${inter.statut || 'À planifier'}</span></td>
            <td>
                <a class="btn" href="modifier.html?id=${inter.id}">Modifier</a>
            </td>
        `;
        tbody.appendChild(tr);
    });

    // Après avoir construit le tableau, appliquer/normaliser les classes de statut
    applyStatusClasses();
}

/* Appliquer classes de statut et ligne si manquantes */
function applyStatusClasses() {
    document.querySelectorAll('#tableauInterventions tbody tr').forEach(tr => {
        const statutCell = tr.querySelector('td:nth-child(6)'); // colonne statut
        if (!statutCell) return;
        const badge = statutCell.querySelector('.statut');
        const statutText = (badge ? badge.textContent : statutCell.textContent || '').trim().toLowerCase();

        // Normaliser le texte en classe
        let cls = 'a-planifier';
        if (statutText.includes('en cours')) cls = 'en-cours';
        else if (statutText.includes('termin')) cls = 'termine';
        else if (statutText.includes('planifi')) {
            // différencier "à planifier" et "planifié"
            if (statutText.includes('à planifi') || statutText.includes('à ')) cls = 'a-planifier';
            else cls = 'planifie';
        }

        // Ajouter classe badge si absent
        if (badge) {
            badge.classList.remove('statut-a-planifier','statut-planifie','statut-en-cours','statut-termine');
            badge.classList.add('statut-' + cls);
        } else {
            // créer un badge si nécessaire
            statutCell.innerHTML = `<span class="statut statut-${cls}">${statutCell.textContent.trim()}</span>`;
        }

        // Ajouter classe de ligne (nettoyage puis ajout)
        tr.classList.remove('ligne-a-planifier','ligne-planifie','ligne-en-cours','ligne-termine');
        tr.classList.add('ligne-' + cls);
    });
}

/* Événements */
document.getElementById('recherche').addEventListener('input', render);
document.getElementById('resetData').addEventListener('click', function(e){
    e.preventDefault();
    if (confirm('Réinitialiser les données de test ?')) {
        initializeSampleData(true);
        render();
    }
});

/* Initialisation */
window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
