<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle intervention</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Créer une intervention</h1>
    </header>

    <div class="container">

        <div class="card">

            <form id="interventionForm">

                <!-- CHANTIER -->
                <label for="chantier">Nom du chantier</label>
                <input type="text" id="chantier" placeholder="Nom du chantier" required>

                <!-- DEMANDEUR -->
                <label for="demandeur">Demandé par</label>
                <select id="demandeur" required></select>

                <!-- TYPE -->
                <label for="type">Type d’intervention</label>
                <select id="type" required></select>

                <!-- DATE DEBUT -->
                <label for="dateDebut">Date de début</label>
                <input type="date" id="dateDebut" required>

                <!-- DATE PLANIF -->
                <label for="datePlanif">Date planifiée</label>
                <input type="date" id="datePlanif">

                <!-- STATUT -->
                <label for="statut">Statut</label>
                <select id="statut" required>
                    <option value="À planifier">À planifier</option>
                    <option value="Planifiée">Planifiée</option>
                    <option value="Terminée">Terminée</option>
                </select>

                <!-- ADRESSE -->
                <label for="adresse">Adresse</label>
                <input type="text" id="adresse" placeholder="Adresse du chantier">

                <!-- VILLE -->
                <label for="ville">Ville</label>
                <input type="text" id="ville" placeholder="Ville">

                <!-- OBSERVATIONS -->
                <label for="observations">Observations</label>
                <textarea id="observations" placeholder="Observations..."></textarea>

                <!-- NOTE INTERNE -->
                <label for="noteInterne">Note interne</label>
                <textarea id="noteInterne" placeholder="Note interne..."></textarea>

                <!-- BOUTON -->
                <button type="submit" class="btn-primary">Enregistrer</button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
