<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Débouchage - Nouvelle Intervention</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Créer une intervention</h1>
    </header>

    <div class="container">
        <div class="card">

            <form id="interventionForm">

                <!-- Champ supprimé : N° Intervention -->

                <div>
                    <label>Nom du chantier</label>
                    <input type="text" id="chantier">
                </div>

                <div>
                    <label>Demandé par</label>
                    <select id="demandeur"></select>
                </div>

                <div>
                    <label>Type</label>
                    <select id="type"></select>
                </div>

                <div>
                    <label>Date début possible</label>
                    <input type="date" id="dateDebut">
                </div>

                <div>
                    <label>Date de planification</label>
                    <input type="date" id="datePlanif">
                </div>

                <div>
                    <label>Statut</label>
                    <select id="statut">
                        <option value="À planifier">À planifier</option>
                        <option value="Planifiée">Planifiée</option>
                        <option value="Terminée">Terminée</option>
                    </select>
                </div>

                <div>
                    <label>Adresse</label>
                    <input type="text" id="adresse">
                </div>

                <div>
                    <label>Ville</label>
                    <input type="text" id="ville">
                </div>

                <div>
                    <label>Observations</label>
                    <textarea id="observations"></textarea>
                </div>

                <div>
                    <label>Note interne</label>
                    <select id="noteInterne">
                        <option value="Non">Non</option>
                        <option value="Oui">Oui</option>
                    </select>
                </div>

                <button type="submit">Créer l’intervention</button>

            </form>

            <div style="text-align:center; margin-top:20px;">
                <a href="index.html" class="btn">Retour à la liste</a>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
