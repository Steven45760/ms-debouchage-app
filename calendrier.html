<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier des interventions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style calendrier */
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 20px;
        }
        .day {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            min-height: 80px;
            position: relative;
        }
        .day:hover {
            background: #2a2a2a;
        }
        .day-number {
            font-size: 18px;
            font-weight: bold;
        }
        .event-dot {
            width: 8px;
            height: 8px;
            background: #4da3ff;
            border-radius: 50%;
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
        }
        .event-list {
            margin-top: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
        }
        .event-item {
            padding: 8px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

<header>
    <h1>Calendrier des interventions</h1>
</header>

<main class="container">

    <div id="monthTitle" style="text-align:center; font-size:22px; margin-bottom:15px;"></div>

    <div class="calendar" id="calendar"></div>

    <div class="event-list" id="eventList" style="display:none;">
        <h3>Interventions du <span id="selectedDate"></span></h3>
        <div id="eventItems"></div>
    </div>

    <div style="text-align:center; margin-top:20px;">
        <a href="index.html" class="btn-retour">⬅ Retour au tableau</a>
    </div>

</main>

<script>
function loadCalendar() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const calendar = document.getElementById("calendar");
    const monthTitle = document.getElementById("monthTitle");

    const monthNames = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
    monthTitle.textContent = monthNames[month] + " " + year;

    calendar.innerHTML = "";

    let interventions = JSON.parse(localStorage.getItem("interventions")) || [];

    // Cases vides avant le 1er
    for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
        const empty = document.createElement("div");
        calendar.appendChild(empty);
    }

    // Jours du mois
    for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement("div");
        cell.className = "day";

        const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

        cell.innerHTML = `<div class="day-number">${d}</div>`;

        // Si interventions ce jour → point bleu
        if (interventions.some(i => i.datePlanif === dateStr)) {
            const dot = document.createElement("div");
            dot.className = "event-dot";
            cell.appendChild(dot);
        }

        cell.addEventListener("click", () => showEvents(dateStr));

        calendar.appendChild(cell);
    }
}

function showEvents(dateStr) {
    const list = document.getElementById("eventList");
    const items = document.getElementById("eventItems");
    const selectedDate = document.getElementById("selectedDate");

    selectedDate.textContent = dateStr;
    items.innerHTML = "";

    let interventions = JSON.parse(localStorage.getItem("interventions")) || [];
    let events = interventions.filter(i => i.datePlanif === dateStr);

    if (events.length === 0) {
        items.innerHTML = "<p>Aucune intervention ce jour.</p>";
    } else {
        events.forEach(ev => {
            const div = document.createElement("div");
            div.className = "event-item";
            div.innerHTML = `
                <strong>${ev.numero}</strong> — ${ev.chantier}<br>
                ${ev.type} — ${ev.statut}<br>
                <a class="btn" href="modifier.html?id=${ev.id}">Modifier</a>
            `;
            items.appendChild(div);
        });
    }

    list.style.display = "block";
}

window.onload = loadCalendar;
</script>

</body>
</html>
